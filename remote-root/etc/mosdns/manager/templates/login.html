<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mosctl 登录</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
  <link rel="icon" href="{{ url_for('static', filename='mosctl-logo.svg') }}" type="image/svg+xml">
  <link rel="icon" href="{{ url_for('static', filename='mosctl-logo-512.png') }}" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='mosctl-logo-512.png') }}">
  <style>
    :root {
      color-scheme: light;
      --bg: #edf2f7;
      --surface: #ffffff;
      --ink: #132033;
      --muted: #65758b;
      --line: #cfdae8;
      --primary: #1f66d1;
      --green: #168a4a;
      --amber: #b45309;
      --danger: #c9362c;
      --shadow: 0 18px 48px rgba(19, 32, 51, .14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(31, 102, 209, .13), transparent 36%),
        linear-gradient(180deg, #f9fbfe 0, var(--bg) 100%);
      color: var(--ink);
      font-family: ui-sans-serif, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }
    .control-room {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(340px, .8fr);
      gap: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow);
    }
    .briefing {
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 34px;
      background: #132033;
      color: #eef5ff;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(31, 102, 209, .28);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 8px 0 0;
      color: #aebdd0;
      font-size: 14px;
    }
    .headline {
      margin: 42px 0 0;
      max-width: 440px;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 850;
    }
    .status-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 34px;
    }
    .status-item {
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, .06);
    }
    .status-label {
      color: #aebdd0;
      font-size: 12px;
    }
    .status-value {
      margin-top: 7px;
      font-size: 15px;
      font-weight: 800;
    }
    .login {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 34px;
      background: var(--surface);
    }
    .login h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    .login p {
      margin: 7px 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 15px 0 8px;
      color: var(--muted);
      font-size: 13px;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31, 102, 209, .16);
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 22px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button:focus-visible {
      outline: 3px solid rgba(31, 102, 209, .22);
      outline-offset: 3px;
    }
    .error {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid #ffc9c9;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .control-room { grid-template-columns: 1fr; }
      .briefing { min-height: auto; padding: 26px; }
      .headline { margin-top: 28px; font-size: 28px; }
      .status-strip { grid-template-columns: 1fr; }
      .login { padding: 26px; }
    }
  </style>
</head>
<body>
  <main class="control-room">
    <section class="briefing" aria-label="Mosctl 控制台说明">
      <div>
        <div class="brand">
          <img src="{{ url_for('static', filename='mosctl-logo.svg') }}" alt="Mosctl">
          <div>
            <h1>Mosctl 控制台</h1>
            <p class="subtitle">DNS 运维入口</p>
          </div>
        </div>
        <div class="headline">进入 mosdns 解析服务的运维控制室。</div>
      </div>
      <div class="status-strip" aria-label="能力摘要">
        <div class="status-item">
          <div class="status-label">监控</div>
          <div class="status-value">服务态势</div>
        </div>
        <div class="status-item">
          <div class="status-label">策略</div>
          <div class="status-value">分流规则</div>
        </div>
        <div class="status-item">
          <div class="status-label">维护</div>
          <div class="status-value">备份升级</div>
        </div>
      </div>
    </section>

    <form class="login" method="post">
      <h2>登录</h2>
      <p>使用安装时生成或自定义的 Web 面板账号进入控制台。</p>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" autofocus>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
      <button type="submit">进入控制台</button>
    </form>
  </main>
</body>
</html>
