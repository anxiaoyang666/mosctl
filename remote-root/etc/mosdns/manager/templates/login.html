<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mosctl 登录</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
  <link rel="icon" href="{{ url_for('static', filename='mosctl-logo.svg') }}" type="image/svg+xml">
  <link rel="icon" href="{{ url_for('static', filename='mosctl-logo-512.png') }}" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='mosctl-logo-512.png') }}">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #2563eb;
      --danger: #dc2626;
      --shadow: 0 16px 48px rgba(23, 32, 51, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .login {
      width: min(400px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .22);
    }
    h1 {
      margin: 0 0 3px;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 13px;
      color: var(--muted);
    }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .14);
    }
    button {
      width: 100%;
      height: 42px;
      margin-top: 22px;
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="login" method="post">
    <div class="brand">
      <img src="{{ url_for('static', filename='mosctl-logo.svg') }}" alt="Mosctl">
      <div>
        <h1>Mosctl</h1>
        <p>管理面板</p>
      </div>
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <label for="username">用户名</label>
    <input id="username" name="username" autocomplete="username" autofocus>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password">
    <button type="submit">登录</button>
  </form>
</body>
</html>
